<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FinTech Hub — Programs</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0f172a 100%);
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
  }
  header {
    text-align: center;
    margin-bottom: 50px;
    max-width: 720px;
  }
  .badge {
    display: inline-block;
    padding: 6px 14px;
    background: rgba(59, 130, 246, 0.15);
    border: 1px solid rgba(59, 130, 246, 0.4);
    border-radius: 999px;
    color: #93c5fd;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
    margin-bottom: 20px;
  }
  h1 {
    font-size: 48px;
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 16px;
    background: linear-gradient(90deg, #fff 0%, #93c5fd 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  p.subtitle {
    color: #cbd5e1;
    font-size: 17px;
    line-height: 1.6;
  }
  .button-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 18px;
    width: 100%;
    max-width: 900px;
  }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 22px 28px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 14px;
    color: #fff;
    text-decoration: none;
    font-size: 16px;
    font-weight: 600;
    text-align: center;
    transition: all 0.25s ease;
    backdrop-filter: blur(10px);
    cursor: pointer;
  }
  .btn:hover {
    transform: translateY(-3px);
    background: rgba(59, 130, 246, 0.2);
    border-color: rgba(59, 130, 246, 0.6);
    box-shadow: 0 12px 30px rgba(59, 130, 246, 0.25);
  }
  .btn.primary {
    background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
    border-color: transparent;
  }
  .btn.primary:hover {
    background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    box-shadow: 0 12px 30px rgba(37, 99, 235, 0.5);
  }
  footer {
    margin-top: 60px;
    color: #64748b;
    font-size: 13px;
  }
  @media (max-width: 600px) {
    h1 { font-size: 34px; }
    p.subtitle { font-size: 15px; }
  }
</style>
</head>
<body>
  <header>
    <span class="badge">FINTECH HUB</span>
    <h1>Modern Finance, Built for You</h1>
    <p class="subtitle">Explore our programs designed to simplify investing, payments, and wealth management for the next generation.</p>
  </header>

  <div class="button-grid">
    <a class="btn primary" href="https://drive.google.com/file/d/1pJ430ESP1wGSdwo5HfcyuyZJmn35Y7xD/view?usp=sharing" target="_blank" rel="noopener noreferrer">Program 6</a>
    <a class="btn primary" href="https://drive.google.com/file/d/1JsSVvpp7s2CeeJvW_odO7EJYCH42bc1T/view?usp=sharing" target="_blank" rel="noopener noreferrer">Program 7</a>
    <a class="btn primary" href="https://drive.google.com/file/d/1DKRK5B6HM_JlZTENOy4d-vwUDArmzhst/view?usp=sharing" target="_blank" rel="noopener noreferrer">Program 8</a>
    <a class="btn primary" href="https://drive.google.com/file/d/1MufsEwNfFCfTvM6hNKNBR0SHDnbB5sdz/view?usp=sharing" target="_blank" rel="noopener noreferrer">Program 9</a>
    <a class="btn primary" href="https://drive.google.com/file/d/1AVaFbnYupRPBSfbkX_SdhHj-NLn58foj/view?usp=sharing" target="_blank" rel="noopener noreferrer">Program 10</a>
  </div>

  <footer>&copy; 2026 FinTech Hub. All rights reserved.</footer>
</body>
</html>
